<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JA Webs · Enlace en bio</title>

    <!-- TIPOGRAFÍAS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

    <!-- FONTAWESOME 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        /* ================================================================
           TOKENS — FONDO CLARO
           ================================================================ */
        :root {
            --bg: #f8f6ff;
            --bg-card: #ffffff;
            --border-light: #eae7f5;
            --purple: #6c2bd9;
            --purple-light: #a37ef5;
            --purple-soft: #f0ebff;
            --cyan: #00c2d6;
            --text-primary: #1c1828;
            --text-secondary: #4a4460;
            --text-muted: #7a7492;
            --shadow-card: 0 8px 30px rgba(108, 43, 217, 0.08);
            --shadow-hover: 0 12px 40px rgba(108, 43, 217, 0.15);
            --grad-signature: linear-gradient(135deg, var(--purple) 0%, #4d1fb8 50%, var(--cyan) 100%);
            --ease-brand: cubic-bezier(0.16, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
            cursor: pointer;
        }

        ::selection {
            background: var(--purple);
            color: #fff;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ---------- FONDO CON GLOW SUTIL ---------- */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(108, 43, 217, 0.06), transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 90%, rgba(0, 194, 214, 0.05), transparent 60%),
                radial-gradient(ellipse 70% 40% at 50% 50%, rgba(163, 126, 245, 0.04), transparent 70%);
        }

        /* ================================================================
           CONTENEDOR
           ================================================================ */
        .page {
            position: relative;
            z-index: 2;
            max-width: 460px;
            margin: 0 auto;
            padding: 36px 20px 60px;
            min-height: 100vh;
        }

        /* ---------- BARRA DE REGRESO ---------- */
        .back-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 18px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: 100px;
            background: #ffffff;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: .76rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: all .3s var(--ease-brand);
        }

        .back-link i {
            color: var(--purple);
            font-size: .7rem;
        }

        .back-link:hover {
            border-color: var(--purple-light);
            background: var(--purple-soft);
            color: var(--purple);
            transform: translateY(-1px);
        }

        /* ---------- PERFIL ---------- */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: var(--grad-signature);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px -4px rgba(108, 43, 217, 0.35);
        }

        .avatar-ring .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-ring .avatar img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .handle {
            margin-top: 18px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .handle i {
            color: var(--purple);
            font-size: .95rem;
        }

        /* ---------- MENSAJE PARA NEGOCIANTES ---------- */
        .promo-message {
            margin-top: 12px;
            padding: 16px 20px;
            background: var(--purple-soft);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            width: 100%;
            text-align: center;
        }

        .promo-message p {
            font-size: .88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .promo-message strong {
            color: var(--purple);
        }

        .promo-message .highlight {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 16px;
            background: var(--grad-signature);
            color: #fff;
            border-radius: 100px;
            font-size: .78rem;
            font-weight: 600;
            transition: all .3s var(--ease-brand);
            cursor: pointer;
        }

        .promo-message .highlight:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(108, 43, 217, 0.3);
        }

        .tiktok-follow {
            margin-top: 18px;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 11px 22px;
            border-radius: 100px;
            background: var(--purple);
            color: #fff;
            font-size: .85rem;
            font-weight: 600;
            transition: all .35s var(--ease-brand);
            box-shadow: 0 4px 16px rgba(108, 43, 217, 0.25);
        }

        .tiktok-follow i {
            font-size: .95rem;
        }

        .tiktok-follow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 43, 217, 0.35);
        }

        /* ---------- BADGES ---------- */
        .trust-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .trust-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 100px;
            background: #ffffff;
            border: 1px solid var(--border-light);
            font-size: .74rem;
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .trust-pill i {
            color: var(--purple);
            font-size: .7rem;
        }

        /* ---------- CATEGORÍAS ---------- */
        .cat-scroll {
            display: flex;
            gap: 9px;
            margin-top: 30px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: none;
        }

        .cat-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-pill {
            flex: 0 0 auto;
            padding: 9px 18px;
            border-radius: 100px;
            font-size: .82rem;
            font-weight: 500;
            background: #ffffff;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            transition: all .3s var(--ease-brand);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .cat-pill.active {
            color: #fff;
            border-color: transparent;
            background: var(--grad-signature);
            box-shadow: 0 6px 20px -8px rgba(108, 43, 217, 0.5);
        }

        .cat-pill:hover:not(.active) {
            border-color: var(--purple-light);
            background: var(--purple-soft);
        }

        /* ---------- LISTA DE PRODUCTOS ---------- */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 26px;
        }

        .product {
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 18px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            transition: all .35s var(--ease-brand);
            cursor: pointer;
            will-change: transform;
        }

        .product:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--purple-light);
        }

        .product:active {
            transform: scale(0.97);
        }

        .product-icon {
            flex: 0 0 auto;
            width: 80px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--purple-soft);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .product-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .product-icon i {
            font-size: 2rem;
            color: var(--purple);
        }

        .product-info {
            flex: 1 1 auto;
            min-width: 0;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.25;
            color: var(--text-primary);
        }

        .product-tag {
            font-size: .68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-top: 3px;
        }

        .product-desc {
            margin-top: 4px;
            font-size: .82rem;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .price {
            font-family: 'JetBrains Mono', monospace;
            font-size: .9rem;
            font-weight: 600;
            color: var(--purple);
        }

        .rating-mini {
            font-size: .72rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rating-mini i {
            color: #f5b342;
            font-size: .65rem;
        }

        .product-arrow {
            flex: 0 0 auto;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--grad-signature);
            color: #fff;
            font-size: .8rem;
            transition: transform .35s var(--ease-brand);
        }

        .product:hover .product-arrow {
            transform: translateX(3px) scale(1.05);
        }

        .aff-tiny {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: .6rem;
            color: var(--text-muted);
            letter-spacing: .02em;
        }

        .product.featured {
            background: linear-gradient(135deg, #f8f4ff, #f0ebff);
            border-color: var(--purple-light);
        }

        .badge-hot {
            position: absolute;
            top: -1px;
            left: 16px;
            padding: 3px 10px 4px;
            border-radius: 0 0 8px 8px;
            background: var(--grad-signature);
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: #fff;
        }

        /* ---------- FOOTER ---------- */
        .page-footer {
            margin-top: 34px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .socials {
            display: flex;
            gap: 12px;
        }

        .socials a {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 1px solid var(--border-light);
            font-size: .9rem;
            color: var(--text-secondary);
            transition: all .3s var(--ease-brand);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .socials a:hover {
            color: var(--purple);
            border-color: var(--purple-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .copyright {
            font-size: .7rem;
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 360px) {
            .page {
                padding: 28px 14px 44px;
            }
            .back-link {
                font-size: .7rem;
                padding: 7px 13px;
            }
            .product {
                padding: 14px;
                gap: 12px;
            }
            .product-icon {
                width: 64px;
                height: 64px;
            }
            .avatar-ring {
                width: 96px;
                height: 96px;
            }
        }
    </style>
</head>

    <!-- ================================================================

    ================================================================ -->
    <script>
        gsap.registerPlugin(ScrollTrigger);
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ================================================================
        // 1. ANIMACIÓN DE ENTRADA
        // ================================================================
        gsap.set('#avatar', { opacity: 0, scale: 0.5 });
        gsap.set('#back-bar, #handle, #promo-message, #follow-btn, #trust-row, #filters', { opacity: 0, y: 18 });
        gsap.set('.product', { opacity: 0, y: 24, scale: 0.97 });

        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
        tl.to('#back-bar', { opacity: 1, y: 0, duration: 0.5 }, 0)
            .to('#avatar', { opacity: 1, scale: 1, duration: 0.75, ease: 'back.out(1.6)' }, 0.05)
            .to('#handle', { opacity: 1, y: 0, duration: 0.6 }, 0.2)
            .to('#promo-message', { opacity: 1, y: 0, duration: 0.6 }, 0.3)
            .to('#follow-btn', { opacity: 1, y: 0, duration: 0.6, ease: 'back.out(1.4)' }, 0.4)
            .to('#trust-row', { opacity: 1, y: 0, duration: 0.6 }, 0.5)
            .to('#filters', { opacity: 1, y: 0, duration: 0.6 }, 0.58);

        // ================================================================
        // 2. DATOS DE PRODUCTOS — TODAS TUS IMÁGENES
        // ================================================================
        const productosData = [{
            nombre: "Plan de alimentación de 21 días",
            precio: "$220 MXN",
            categoria: "salud",
            link: "https://go.hotmart.com/J106697584L",
            descripcion: "Plan nutricional semanal con recetas saludables y guía de ejercicios.",
            imagen: "plan-alimentación -21-dias.png",
            destacado: true
        }, {
            nombre: "Curso de Reparación de Computadoras NIVEL 2",
            precio: "$8,327 MXN",
            categoria: "ia",
            link: "https://go.hotmart.com/U103639716K",
            descripcion: "Aprende diagnóstico avanzado, electrónica y reparación de placas madre.",
            imagen: "Reparacion-computadoras-ecu.png"
        }, {
            nombre: "Jabones DIY: De Principiante a Experto Pack 7x1",
            precio: "$321 MXN",
            categoria: "diseno",
            link: "https://go.hotmart.com/H106707879P?ap=31eb",
            descripcion: "7 cursos completos para crear jabones artesanales desde cero.",
            imagen: "JABONES Artesanales.png"
        }, {
            nombre: "Máster de Ojos - Perfeccionamiento",
            precio: "$1,069 MXN",
            categoria: "diseno",
            link: "https://go.hotmart.com/T106707939Y",
            descripcion: "Técnicas profesionales de maquillaje de ojos para todo tipo de rostro.",
            imagen: "ojoscurso.jpg"
        }, {
            nombre: "Guitarra para Principiantes con Música Cristiana",
            precio: "$855 MXN",
            categoria: "cursos",
            link: "https://go.hotmart.com/H106708004N?ap=8eac",
            descripcion: "Aprende acordes, ritmos y canciones cristianas en guitarra desde cero.",
            imagen: "Guitarra-para-principiantes-musica-cristiana.png"
        }, {
            nombre: "Aprende Piano Desde Cero Con Música Cristiana",
            precio: "$1,069 MXN",
            categoria: "cursos",
            link: "https://go.hotmart.com/E106708030K",
            descripcion: "Método progresivo para tocar piano con canciones de adoración.",
            imagen: "pianocurso.png"
        }, {
            nombre: "Manual para Diseño de Cejas",
            precio: "$428 MXN",
            categoria: "diseno",
            link: "https://go.hotmart.com/Y106708046I?ap=364d",
            descripcion: "Guía completa de microblading, perfilado y tendencias en cejas.",
            imagen: "cejascurso.jpg"
        }];

        // ================================================================
        // 3. RENDERIZADO DE PRODUCTOS
        // ================================================================
        const productList = document.getElementById('product-list');

        function renderProducts(productos) {
            productList.innerHTML = '';
            productos.forEach((p) => {
                const enlace = document.createElement('a');
                enlace.className = `product ${p.destacado ? 'featured' : ''}`;
                enlace.dataset.cat = p.categoria;
                enlace.href = p.link;
                enlace.target = '_blank';
                enlace.rel = 'noopener noreferrer sponsored';

                // Usar imagen o icono por defecto
                const iconoHtml = p.imagen ?
                    `<img src="${p.imagen}" alt="${p.nombre}" />` :
                    `<i class="fa-solid fa-box"></i>`;

                enlace.innerHTML = `
                        ${p.destacado ? '<span class="badge-hot">Top ventas</span>' : ''}
                        <div class="product-icon">${iconoHtml}</div>
                        <div class="product-info">
                            <div class="product-name">${p.nombre}</div>
                            <div class="product-tag">${p.categoria.replace(/ /g, ' · ')}</div>
                            <div class="product-desc">${p.descripcion}</div>
                            <div class="product-bottom">
                                <span class="price">${p.precio}</span>
                                <span class="rating-mini"><i class="fa-solid fa-star"></i> 4.5</span>
                            </div>
                        </div>
                        <div class="product-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                        <span class="aff-tiny">Afiliado</span>
                    `;

                // Feedback táctil
                enlace.addEventListener('pointerdown', () => {
                    gsap.to(enlace, { scale: 0.97, duration: 0.15, ease: 'power2.out' });
                });
                enlace.addEventListener('pointerup', () => {
                    gsap.to(enlace, { scale: 1, duration: 0.3, ease: 'back.out(2)' });
                });

                productList.appendChild(enlace);
            });

            // Scroll reveal
            gsap.utils.toArray('.product').forEach((card, i) => {
                if (i < 5) return;
                gsap.fromTo(card, { opacity: 0, y: 30, scale: 0.97 }, {
                    opacity: 1,
                    y: 0,
                    scale: 1,
                    duration: 0.7,
                    ease: 'back.out(1.2)',
                    scrollTrigger: { trigger: card, start: 'top 92%', once: true }
                });
            });
        }

        renderProducts(productosData);

        // ================================================================
        // 4. FILTRO POR CATEGORÍA
        // ================================================================
        const filterButtons = document.querySelectorAll('.cat-pill');

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;

                const filtrados = productosData.filter(p => {
                    const cats = p.categoria.split(' ');
                    return filter === 'todos' || cats.includes(filter);
                });

                const currentProducts = document.querySelectorAll('.product');
                const tl = gsap.timeline();
                if (currentProducts.length) {
                    tl.to(currentProducts, {
                        opacity: 0,
                        y: 12,
                        scale: 0.96,
                        duration: 0.2,
                        stagger: 0.02,
                        ease: 'power2.in',
                        onComplete: () => renderProducts(filtrados)
                    });
                } else {
                    renderProducts(filtrados);
                }

                tl.fromTo('.product', { opacity: 0, y: 16, scale: 0.97 }, {
                    opacity: 1,
                    y: 0,
                    scale: 1,
                    duration: 0.4,
                    stagger: 0.05,
                    ease: 'back.out(1.3)'
                });
            });
        });
    </script>

</body>
</html>
